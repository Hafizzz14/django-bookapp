{% extends 'base.html' %}
{% block title %}Hapus Buku{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="custom-card p-5 text-center">
            <div class="mb-3">
                <i class="bi bi-trash3-fill text-danger" style="font-size:60px;"></i>
            </div>

            <h2 class="fw-bold mb-3">Hapus Buku</h2>
            <p class="text-muted mb-4">
                Apakah Anda yakin ingin menghapus buku berikut?
            </p>

            <div class="alert alert-light border">
                <strong>{{ book.title }}</strong>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2 mt-4">
                    <a href="{% url 'book_list' %}" class="btn btn-outline-secondary">
                        Batal
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>
                        Hapus
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
