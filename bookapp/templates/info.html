{% extends 'base.html' %}
{% block title %}Informasi Session{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="custom-card p-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-check text-success" style="font-size:60px;"></i>
                <h2 class="fw-bold mt-3">Informasi Session & Cookie</h2>
                <p class="text-muted">Informasi penyimpanan data pengguna.</p>
            </div>

            <div class="list-group mb-4">
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <span>
                        <i class="bi bi-clock-history me-2 text-primary"></i>
                        Last Page
                    </span>
                    <span class="badge bg-primary">
                        {{ last_page }}
                    </span>
                </div>

                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <span>
                        <i class="bi bi-cookie me-2 text-warning"></i>
                        Total Visit
                    </span>
                    <span class="badge bg-success">
                        {{ visited }}
                    </span>
                </div>
            </div>

            <div class="text-center">
                <a href="{% url 'book_list' %}" class="btn btn-primary">
                    <i class="bi bi-arrow-left me-2"></i>
                    Kembali ke Daftar Buku
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
